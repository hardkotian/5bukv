<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 300 180"
     width="300" height="180">

  <!-- Фон: верх красный, низ зелёный (2:1 по высоте) -->
  <rect x="0" y="0" width="300" height="180" fill="#D22730"/>
  <rect x="0" y="120" width="300" height="60" fill="#009B3A"/>

  <!-- Белая вертикальная полоса под орнамент -->
  <rect x="0" y="0" width="36" height="180" fill="#FFFFFF"/>

  <!-- Упрощённый орнамент (геометрический, без претензии на точное повторение) -->
  <!-- Сетка 6x12, красные ромбы по белому фону -->
  <g fill="#D22730">
    <!-- Каждый "ромб" как повернутый квадрат -->
    <!-- Столбец 1 -->
    <polygon points="6,15 3,18 6,21 9,18"/>
    <polygon points="6,45 3,48 6,51 9,48"/>
    <polygon points="6,75 3,78 6,81 9,78"/>
    <polygon points="6,105 3,108 6,111 9,108"/>
    <polygon points="6,135 3,138 6,141 9,138"/>
    <polygon points="6,165 3,168 6,171 9,168"/>

    <!-- Столбец 2 -->
    <polygon points="12,30 9,33 12,36 15,33"/>
    <polygon points="12,60 9,63 12,66 15,63"/>
    <polygon points="12,90 9,93 12,96 15,93"/>
    <polygon points="12,120 9,123 12,126 15,123"/>
    <polygon points="12,150 9,153 12,156 15,153"/>

    <!-- Столбец 3 -->
    <polygon points="18,15 15,18 18,21 21,18"/>
    <polygon points="18,45 15,48 18,51 21,48"/>
    <polygon points="18,75 15,78 18,81 21,78"/>
    <polygon points="18,105 15,108 18,111 21,108"/>
    <polygon points="18,135 15,138 18,141 21,138"/>
    <polygon points="18,165 15,168 18,171 21,168"/>

    <!-- Столбец 4 -->
    <polygon points="24,30 21,33 24,36 27,33"/>
    <polygon points="24,60 21,63 24,66 27,63"/>
    <polygon points="24,90 21,93 24,96 27,93"/>
    <polygon points="24,120 21,123 24,126 27,123"/>
    <polygon points="24,150 21,153 24,156 27,153"/>

    <!-- Столбец 5 -->
    <polygon points="30,15 27,18 30,21 33,18"/>
    <polygon points="30,45 27,48 30,51 33,48"/>
    <polygon points="30,75 27,78 30,81 33,78"/>
    <polygon points="30,105 27,108 30,111 33,108"/>
    <polygon points="30,135 27,138 30,141 33,138"/>
    <polygon points="30,165 27,168 30,171 33,168"/>
  </g>
</svg>