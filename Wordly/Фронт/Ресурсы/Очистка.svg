<svg width="60" height="60" xmlns="http://www.w3.org/2000/svg">
  <g transform="scale(1,1)" transform-origin="30 30">

    <!-- Прямоугольник: жёлтый → чёрный -->
    <rect id="box" x="2" y="2" width="56" height="56" rx="10" ry="10"
          fill="black" stroke="#FFE433" stroke-width="2">
      <animate attributeName="fill"
               values="black; black; black"
               keyTimes="0;0.5;1"
               dur="0.5s"
               fill="freeze" />
      <animate attributeName="stroke"
               values="#FFE433; #FFE433; #FFE433"
               keyTimes="0;0.5;1"
               dur="0.5s"
               fill="freeze" />
    </rect>

    <!-- Звезда исчезает в середине -->
    <text x="50%" y="55%" font-family="Verdana" font-size="40" fill="white"
          dominant-baseline="middle" text-anchor="middle" opacity="1">
      *
      <animate attributeName="opacity"
               values="1;0;0"
               keyTimes="0;0.5;1"
               dur="0.5s"
               fill="freeze" />
    </text>

    <!-- Анимация разворота -->
    <animateTransform attributeName="transform"
                      type="scale"
                      values="1,1; 0.05,1; 1,1"
                      keyTimes="0; 0.5; 1"
                      dur="0.5s"
                      fill="freeze" />
  </g>
</svg>