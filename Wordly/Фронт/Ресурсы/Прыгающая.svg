<svg width="60" height="60" xmlns="http://www.w3.org/2000/svg">
  <!-- Закруглённый чёрный фон с жёлтой рамкой -->
  <rect x="2" y="2" width="56" height="56" rx="10" ry="10" fill="black" stroke="#FFE433" stroke-width="2" />

  <!-- Центрированная буква "*" с анимацией появления и прыжка -->
  <text x="50%" y="55%" font-family="Verdana" font-size="40" fill="white"
        dominant-baseline="middle" text-anchor="middle" opacity="0">
    *
    <!-- Анимация появления -->
    <animate attributeName="opacity"
             values="0;1;1;1;1"
             keyTimes="0;0.2;0.4;0.7;1"
             dur="0.6s"
             fill="freeze" />

    <!-- Анимация прыжка -->
    <animateTransform attributeName="transform"
                      attributeType="XML"
                      type="translate"
                      values="0,0; 0,-5; 0,5; 0,-3; 0,0"
                      keyTimes="0; 0.3; 0.5; 0.7; 1"
                      dur="0.6s"
                      repeatCount="1"
                      fill="freeze" />
  </text>
</svg>
